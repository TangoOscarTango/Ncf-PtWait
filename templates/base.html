<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title or "Clinic Cycle Time" }}</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="top-nav">
    <h1>Clinic Cycle Time</h1>
    {% if current_user %}
    <nav>
      <a href="/dashboard">Dashboard</a>
      <a href="/export">Export</a>
      {% if current_user.role.value == 'admin' %}<a href="/admin">Admin</a>{% endif %}
      <span>{{ current_user.username }} ({{ current_user.role.value }})</span>
      <a href="/logout">Logout</a>
    </nav>
    {% endif %}
  </header>

  <main class="container">
    {% if flash %}
      <div class="flash {{ flash.level }}">{{ flash.message }}</div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
